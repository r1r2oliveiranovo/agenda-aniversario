<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | B-Day Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body"> <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-cake-candles"></i>
            <h1>B-Day <span>Manager</span></h1>
            <p>Bem-vindo de volta!</p>
        </div>
        <form id="form-login">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" placeholder="Seu usuário" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Entrar no Sistema</button>
        </form>
        <p style="margin-top:15px; font-size: 0.9rem;">Não tem conta? <a href="registro.html" style="color:#4f46e5;">Crie agora</a></p>
    </div>
</body>
</html>
